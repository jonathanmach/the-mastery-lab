services:
  hapi-fhir:
    image: hapiproject/hapi:latest
    container_name: fhir_platform_hapi
    ports:
      - "8081:8080"
    environment:
      hapi.fhir.fhir_version: R4
      hapi.fhir.allow_multiple_delete: "true"
      hapi.fhir.reuse_cached_search_results_millis: "0"
      spring.datasource.url: jdbc:h2:file:/data/hapi/hapi;DB_CLOSE_ON_EXIT=FALSE;DB_CLOSE_DELAY=-1
      spring.datasource.username: sa
      spring.datasource.password: ""
      spring.datasource.driverClassName: org.h2.Driver
      spring.jpa.properties.hibernate.dialect: ca.uhn.fhir.jpa.model.dialect.HapiFhirH2Dialect
      JAVA_OPTS: "-Xms1g -Xmx2g"
    user: root
    volumes:
      - hapi_data:/data/hapi
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8080' 2>/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: fhir_platform_opensearch
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.11.0
    container_name: fhir_platform_dashboards
    ports:
      - "5601:5601"
    environment:
      - OPENSEARCH_HOSTS=http://opensearch:9200
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    depends_on:
      opensearch:
        condition: service_healthy

  postgres-omop:
    image: postgres:16-alpine
    container_name: fhir_platform_omop
    environment:
      POSTGRES_DB: omop
      POSTGRES_USER: omop
      POSTGRES_PASSWORD: omop_secret
    ports:
      - "5435:5432"
    volumes:
      - omop_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omop -d omop"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  api-server:
    image: python:3.12-slim
    container_name: fhir_platform_api
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "pip install --quiet uv && uv run fastapi dev src/app/api/main.py --host 0.0.0.0 --port 8000"
    environment:
      - PYTHONUNBUFFERED=1
      - OPENSEARCH_ENDPOINT=http://opensearch:9200
      - FHIR_BASE_URL=http://hapi-fhir:8080/fhir
      - OMOP_DATABASE_URL=postgresql://omop:omop_secret@postgres-omop:5432/omop
      - ANTHROPIC_API_KEY=
    depends_on:
      opensearch:
        condition: service_healthy
      hapi-fhir:
        condition: service_started
      postgres-omop:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    container_name: fhir_platform_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    ports:
      - "5174:5173"

volumes:
  opensearch_data:
  hapi_data:
  omop_data:
